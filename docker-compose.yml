# ============================================
# Pesantren Tursina Alam — Docker Compose
# Production-Ready Orchestration
# ============================================
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f backend    # Tail backend logs
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop + remove volumes (DESTRUCTIVE)
#
# ============================================

services:
  # ═══════════════════════════════════════════
  # NGINX — Reverse Proxy & SSL Termination
  # ═══════════════════════════════════════════
  nginx:
    image: nginx:1.27-alpine
    container_name: pesantren-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
      - static_assets:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════
  # FRONTEND — React + Vite (Nginx Static)
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-Pesantren Tursina Alam}
    container_name: pesantren-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════
  # BACKEND — Golang Gin API
  # ═══════════════════════════════════════════
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: pesantren-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "8080"
    volumes:
      - uploads_data:/app/uploads
      - ./logs/backend:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════════
  # POSTGRESQL — Primary Database
  # ═══════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: pesantren-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-pesantren}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-pesantren_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
      - ./backups/postgres:/backups
    expose:
      - "5432"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pesantren} -d ${DB_NAME:-pesantren_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Performance tuning via command
    command:
      - "postgres"
      - "-c" 
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_timezone=Asia/Jakarta"
      - "-c"
      - "timezone=Asia/Jakarta"

  # ═══════════════════════════════════════════
  # REDIS — Caching & Session Store
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: pesantren-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 300
      --loglevel notice
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - pesantren-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ═══════════════════════════════════════════
# VOLUMES — Persistent Data
# ═══════════════════════════════════════════
volumes:
  pg_data:
    driver: local
    name: pesantren-pg-data
  redis_data:
    driver: local
    name: pesantren-redis-data
  uploads_data:
    driver: local
    name: pesantren-uploads
  static_assets:
    driver: local
    name: pesantren-static

# ═══════════════════════════════════════════
# NETWORKS — Isolated Communication
# ═══════════════════════════════════════════
networks:
  pesantren-network:
    driver: bridge
    name: pesantren-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
