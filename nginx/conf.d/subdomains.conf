# ============================================
# Pesantren Tursina Alam — Subdomain Routing
# ============================================
# Routing:
#   tursinaalam.sch.id        → Website Profile Pondok
#   admin.tursinaalam.sch.id  → Dashboard Admin
#   wali.tursinaalam.sch.id   → Portal Wali Santri
#   absensi.tursinaalam.sch.id → Sistem Absensi
#   ppdb.tursinaalam.sch.id   → PPDB Online
# ============================================

# ═══════════════════════════════════════════
# Admin Dashboard
# ═══════════════════════════════════════════
server {
    listen 80;
    # listen 443 ssl http2;
    server_name admin.tursinaalam.sch.id;

    # SSL (uncomment when ready)
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }

    # Auth rate limiting
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Frontend SPA
    location / {
        limit_req zone=general_limit burst=30 nodelay;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block sensitive
    location ~ /\.(env|git|docker) { deny all; }
}

