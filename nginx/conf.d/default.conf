# ============================================
# Default Site — Main Pesantren Application
# ============================================
# Routing:
#   /              → Frontend (Landing / Dashboard)
#   /api/          → Backend API
#   /uploads/      → Static uploads
#   /health        → Nginx health (for Docker)
# ============================================

# ── HTTP → HTTPS Redirect (uncomment in production with SSL) ──
# server {
#     listen 80;
#     server_name tursinaalam.sch.id *.tursinaalam.sch.id;
#     
#     # ACME challenge for Let's Encrypt
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#         allow all;
#     }
#     
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# ── Main Server Block ──
server {
    listen 80 default_server;
    # listen 443 ssl http2;  # Uncomment for SSL
    server_name _;

    # ── SSL Configuration (uncomment when certificates are ready) ──
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_timeout 1d;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_tickets off;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # Uncomment for HTTPS
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;" always;

    # ── Nginx Health (for Docker healthcheck) ──
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── API Proxy ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # ── Auth Rate Limiting (brute force protection) ──
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Upload Files (static serve) ──
    location /uploads/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Cache uploaded files
        proxy_cache api_cache;
        proxy_cache_valid 200 30m;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;

        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Backend Health Endpoint (no rate limit) ──
    location /health/api {
        proxy_pass http://backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Frontend (SPA) ──
    location / {
        limit_req zone=general_limit burst=30 nodelay;

        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Cache static assets
        proxy_cache api_cache;
        proxy_cache_valid 200 10m;
    }

    # ── Block sensitive paths ──
    location ~ /\.(env|git|docker) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(sql|bak|old|orig|save)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error Pages ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
